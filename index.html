<!DOCTYPE html>
<html>
<head>
<title>Conversion Core</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: gold;
    text-align: center;
    overflow: hidden;
}

/* ELECTRIC WEB BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle, rgba(255,215,0,0.3) 1px, transparent 1px),
        linear-gradient(45deg, rgba(255,0,0,0.05) 1px, transparent 1px);
    background-size: 50px 50px, 100px 100px;
    animation: move 15s linear infinite;
    opacity: 0.25;
}

@keyframes move {
    0% { transform: translate(0,0); }
    50% { transform: translate(-150px,-150px); }
    100% { transform: translate(0,0); }
}

/* CENTER CONTAINER */
.container {
    position: relative;
    top: 18%;
}

/* TITLE */
h1 {
    font-size: 32px;
    letter-spacing: 3px;
    text-shadow: 0 0 10px gold;
}

/* CONVERGENCE SYMBOL (ABSTRACT CC CORE) */
.core {
    width: 80px;
    height: 80px;
    margin: 20px auto;
    border-radius: 50%;
    background: radial-gradient(circle, gold, red);
    box-shadow: 0 0 25px gold, 0 0 50px red;
}

/* INPUT */
textarea {
    width: 70%;
    height: 120px;
    background: #111;
    color: white;
    border: 1px solid gold;
    padding: 10px;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

/* BUTTON */
button {
    background: linear-gradient(45deg, gold, red);
    color: black;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    font-weight: bold;
    box-shadow: 0 0 15px gold;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 30px red;
    transform: scale(1.05);
}

/* OUTPUT */
pre {
    margin-top: 20px;
    width: 70%;
    margin-left: auto;
    margin-right: auto;
    background: #111;
    padding: 15px;
    border: 1px solid gold;
    text-align: left;
    box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

</style>

</head>

<body>

<div class="container">

<h1>CONVERSION CORE</h1>

<div class="core"></div>

<textarea id="input" placeholder="Describe your situation..."></textarea>
<br>

<button onclick="runCC()">Run CC</button>

<pre id="output"></pre>

</div>

<script src="app.js"></script>

</body>
</html>
