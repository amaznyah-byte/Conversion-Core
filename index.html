<!DOCTYPE html>
<html>
<head>
<title>Conversion Core</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: gold;
    text-align: center;
}

/* ELECTRIC WEB BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at center, rgba(255,215,0,0.4) 1px, transparent 1px),
        radial-gradient(circle at center, rgba(255,0,0,0.15) 1px, transparent 1px);
    background-size: 60px 60px, 120px 120px;
    animation: move 18s linear infinite;
    opacity: 0.35;
}

@keyframes move {
    0% { transform: translate(0,0); }
    50% { transform: translate(-200px,-200px); }
    100% { transform: translate(0,0); }
}

/* NAV */
.nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

.nav div {
    padding: 10px 18px;
    border: 1px solid gold;
    font-size: 12px;
    letter-spacing: 1px;
}

/* TITLE */
h1 {
    margin-top: 10px;
    letter-spacing: 4px;
    text-shadow: 0 0 20px gold;
}

/* CORE */
.core {
    margin: 25px auto;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, gold, red);
    border-radius: 50%;
    box-shadow: 0 0 40px gold, 0 0 80px red;
}

/* MAIN PANEL */
.panel {
    width: 80%;
    margin: 30px auto;
    background: rgba(20,20,20,0.9);
    border: 1px solid gold;
    padding: 20px;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

/* INPUT */
textarea {
    width: 100%;
    height: 100px;
    background: black;
    color: white;
    border: 1px solid gold;
    padding: 10px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 30px;
    background: linear-gradient(45deg, gold, red);
    border: none;
    box-shadow: 0 0 20px gold;
}

/* DASHBOARD GRID */
.dashboard {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.box {
    border: 1px solid gold;
    padding: 10px;
    width: 30%;
}

/* OUTPUT */
pre {
    text-align: left;
    margin-top: 15px;
}

</style>

</head>

<body>

<div class="nav">
    <div>DEVELOPMENT</div>
    <div>CONTROL</div>
    <div>VISIONARY</div>
    <div>PRODUCTION</div>
</div>

<h1>CONVERSION CORE</h1>

<div class="core"></div>

<div class="panel">

<textarea id="input" placeholder="Describe your situation..."></textarea>

<br>

<button onclick="runCC()">Run CC</button>

<pre id="output"></pre>

<div class="dashboard">
    <div class="box">CONFIDENCE: 82%</div>
    <div class="box">RISK: LOW</div>
    <div class="box">LEVERAGE: HIGH</div>
</div>

</div>

<script>
function runCC() {

    const input = document.getElementById("input").value;

    if (!input) {
        alert("Enter a situation first");
        return;
    }

    let insight = "You need clearer direction.";
    let bestMove = "Focus on one high-impact action.";
    let tradeoff = "You gain clarity but lose flexibility.";
    let leverage = "Commit fully to one direction.";

    const output = `
=== CONVERSION CORE ===

INSIGHT:
${insight}

BEST MOVE:
${bestMove}

TRADEOFF:
${tradeoff}

LEVERAGE:
${leverage}
    `;

    document.getElementById("output").innerText = output;
}
</script>

</body>
</html>
