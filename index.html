<!DOCTYPE html>
<html>
<head>
<title>Conversion Core</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: gold;
    text-align: center;
}

/* ELECTRIC WEB BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle, rgba(255,215,0,0.25) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,0,0,0.1) 1px, transparent 1px);
    background-size: 60px 60px, 120px 120px;
    animation: move 20s linear infinite;
    opacity: 0.25;
}

@keyframes move {
    0% { transform: translate(0,0); }
    50% { transform: translate(-200px,-200px); }
    100% { transform: translate(0,0); }
}

/* NAV BAR */
.nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

.nav div {
    padding: 10px 18px;
    border: 1px solid gold;
    font-size: 12px;
    letter-spacing: 1px;
    transition: 0.3s;
}

.nav div:hover {
    background: gold;
    color: black;
}

/* TITLE */
h1 {
    margin-top: 15px;
    letter-spacing: 4px;
    text-shadow: 0 0 15px gold;
}

/* CORE CONVERGENCE */
.core {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 25px auto;
}

.core::before, .core::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: radial-gradient(circle, gold, red);
    box-shadow: 0 0 25px gold, 0 0 40px red;
}

.core::before {
    left: 0;
}

.core::after {
    right: 0;
}

/* INPUT BOX */
textarea {
    width: 75%;
    height: 110px;
    background: #111;
    color: white;
    border: 1px solid gold;
    padding: 12px;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

/* BUTTON */
button {
    background: linear-gradient(45deg, gold, red);
    color: black;
    padding: 12px 30px;
    border: none;
    margin-top: 15px;
    font-weight: bold;
    box-shadow: 0 0 20px gold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px red;
}

/* OUTPUT PANEL */
.output-box {
    width: 75%;
    margin: 25px auto;
    background: #111;
    border: 1px solid gold;
    padding: 15px;
    text-align: left;
    box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

/* METRICS BAR */
.metrics {
    display: flex;
    justify-content: space-around;
    margin-top: 15px;
    font-size: 12px;
}

.metric {
    border: 1px solid gold;
    padding: 5px 10px;
}

</style>

</head>

<body>

<div class="nav">
    <div>DEVELOPMENT</div>
    <div>CONTROL</div>
    <div>VISIONARY</div>
    <div>PRODUCTION</div>
</div>

<h1>CONVERSION CORE</h1>

<div class="core"></div>

<textarea id="input" placeholder="Describe your situation..."></textarea>
<br>

<button onclick="runCC()">Run CC</button>

<div class="output-box">
    <pre id="output"></pre>

    <div class="metrics">
        <div class="metric">CONFIDENCE: 82%</div>
        <div class="metric">RISK: LOW</div>
        <div class="metric">LEVERAGE: HIGH</div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
